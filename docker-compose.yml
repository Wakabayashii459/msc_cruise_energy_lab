version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: msc_energy_postgres
    environment:
      POSTGRES_DB: msc_energy
      POSTGRES_USER: msc_user
      POSTGRES_PASSWORD: msc_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msc_user -d msc_energy"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
